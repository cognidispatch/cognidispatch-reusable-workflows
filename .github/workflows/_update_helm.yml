name: Reusable — Update Helm Chart Values

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Microservice name slug (e.g., auth-service, frontend)"
      helm-value-key:
        required: true
        type: string
        description: "The top-level key in values.yaml (e.g., authService, frontend)"
      image-tag:
        required: true
        type: string
        description: "Docker image tag to set (e.g., v1.0.0 or dev-abc1234)"
      environment:
        required: true
        type: string
        description: "Target environment: 'dev' or 'production'"
      helm-repo:
        required: false
        type: string
        default: "cognidispatch/cognidispatch-helm"
        description: "Helm chart repository (org/repo)"
      require-approval:
        required: false
        type: boolean
        default: false
        description: "Set true to require manual approval gate before updating (use for production)"
    secrets:
      HELM_REPO_PAT:
        required: true
        description: "PAT with write access to cognidispatch-helm repo"

jobs:
  # ── Optional approval gate (production only) ──────────────────────────
# Approval gate removed - production deployments no longer require manual approval

  # ── Update Helm values file ──────────────────────────────────────────
  update-helm:
    name: "📦 Update Helm Values"
    runs-on: ubuntu-latest
    # needs: [approve]  # removed dependency on approval gate
    if: always()

    steps:
      - name: Checkout Helm repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.helm-repo }}
          token: ${{ secrets.HELM_REPO_PAT }}
          ref: production
          fetch-depth: 0

      - name: Set file environment name
        id: set_env
        run: |
          ENV="${{ inputs.environment }}"
          if [ "$ENV" = "production" ]; then
            echo "file_env=prod" >> $GITHUB_OUTPUT
          else
            echo "file_env=$ENV" >> $GITHUB_OUTPUT
          fi

      - name: Update image tag in values file
        run: |
          ENV="${{ steps.set_env.outputs.file_env }}"
          SERVICE="${{ inputs.service-name }}"
          KEY="${{ inputs.helm-value-key }}"
          TAG="${{ inputs.image-tag }}"

          # Determine the values file to update
          VALUES_FILE="microservices/${SERVICE}/values-${ENV}.yaml"

          if [ ! -f "$VALUES_FILE" ]; then
            echo "::error::Values file not found: $VALUES_FILE"
            exit 1
          fi

          echo "Updating $VALUES_FILE → imageTag: $TAG"

          # Use Python for reliable YAML key update
          python3 - <<EOF
          import re, sys, os

          # 1. Update microservice values file
          with open("${VALUES_FILE}", "r") as f:
              content = f.read()

          new_content = re.sub(
              r'(imageTag:\s*)(["\']?).*?\2(\s*$)',
              r'\g<1>"${TAG}"\3',
              content,
              flags=re.MULTILINE
          )

          if new_content == content:
              print("WARNING: imageTag field not found or not updated in microservice values!", file=sys.stderr)
          else:
              with open("${VALUES_FILE}", "w") as f:
                  f.write(new_content)
              print(f"✅ Updated microservice values file imageTag to: ${TAG}")

          # 2. Update root values file
          root_values_file = "values-${ENV}.yaml"
          if os.path.exists(root_values_file):
              print(f"Updating root values file {root_values_file} under key ${KEY} → imageTag: ${TAG}")
              with open(root_values_file, "r") as f:
                  root_content = f.read()

              # Match the service block at 0 indentation
              pattern = r"(^${KEY}:[ \t]*\r?\n)(([ \t]+.*\r?\n|\r?\n)*)"
              match = re.search(pattern, root_content, re.MULTILINE)
              if not match:
                  pattern = r"(^${KEY}:.*?\r?\n)(([ \t]+.*\r?\n|\r?\n)*)"
                  match = re.search(pattern, root_content, re.MULTILINE)

              if match:
                  block_header = match.group(1)
                  block_body = match.group(2)
                  new_block_body = re.sub(
                      r'(imageTag:\s*)(["\']?).*?\2(\s*$)',
                      r'\g<1>"${TAG}"\3',
                      block_body,
                      flags=re.MULTILINE
                  )
                  new_root_content = root_content.replace(match.group(0), block_header + new_block_body)
                  with open(root_values_file, "w") as f:
                      f.write(new_root_content)
                  print(f"✅ Updated root values file imageTag to: ${TAG}")
              else:
                  print(f"WARNING: Key ${KEY} not found in root {root_values_file}!", file=sys.stderr)
          else:
              print(f"WARNING: Root values file {root_values_file} not found!", file=sys.stderr)
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add microservices/${{ inputs.service-name }}/values-${{ steps.set_env.outputs.file_env }}.yaml
          git add values-${{ steps.set_env.outputs.file_env }}.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update ${{ inputs.service-name }} imageTag to ${{ inputs.image-tag }} [${{ inputs.environment }}] [skip ci]"

          # Push with retry on race condition
          for i in {1..5}; do
            git pull --rebase origin production && \
            git push origin production && \
            echo "✅ Helm chart updated" && exit 0
            echo "Push failed, retrying in 5s... (attempt $i)"
            sleep 5
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1

      - name: Output Summary
        run: |
          echo "## 🎯 Helm Chart Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ inputs.service-name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ inputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Values File | \`microservices/${{ inputs.service-name }}/values-${{ steps.set_env.outputs.file_env }}.yaml\` |" >> $GITHUB_STEP_SUMMARY
